# AeroSpace window manager configuration.
# Managed by GNU Stow from this dotfiles repository.

# Start AeroSpace automatically after login.
start-at-login = true

# Keep layouts predictable and easy to reason about.
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Start new workspaces in a simple tiled layout.
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Use standard US key names for bindings.
[key-mapping]
preset = 'qwerty'

# Small, consistent spacing around and between windows.
[gaps]
inner.horizontal = 8
inner.vertical = 8
outer.left = 8
outer.bottom = 8
outer.top = 8
outer.right = 8

# Main mode: day-to-day i3-like navigation and workspace control.
[mode.main.binding]

# Launch terminal.
alt-enter = 'exec-and-forget open -n /Applications/Ghostty.app'

# Focus windows with Vim-style movement.
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# Move windows with Vim-style movement.
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Toggle fullscreen for the focused window.
alt-f = 'fullscreen'

# Switch workspaces.
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# Move the focused window to a workspace.
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Enter service mode for less common layout commands.
alt-shift-semicolon = 'mode service'

# Service mode: press one key, run a command, then return to main mode.
[mode.service.binding]
esc = 'mode main'
r = ['reload-config', 'mode main']
f = ['flatten-workspace-tree', 'mode main']
space = ['layout floating tiling', 'mode main']

# Join the focused window with a neighbor in the chosen direction.
h = ['join-with left', 'mode main']
j = ['join-with down', 'mode main']
k = ['join-with up', 'mode main']
l = ['join-with right', 'mode main']
