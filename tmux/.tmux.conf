# Amoryn tmux configuration
# Managed by GNU Stow from the dotfiles repository.

###############################################################################
# Prefix and basics
###############################################################################

# Use Ctrl-space as the prefix.
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start windows and panes at 1 instead of 0.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Mouse support for pane selection, resizing, and scrollback.
set -g mouse on

# Larger scrollback history.
set -g history-limit 100000

###############################################################################
# Terminal and copy mode
###############################################################################

# Use vi keys in copy mode.
setw -g mode-keys vi

# True color in tmux, including Ghostty's xterm-ghostty TERM value.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB"

# Copy selected text to the macOS clipboard.
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

###############################################################################
# Windows and panes
###############################################################################

# Open new windows and splits in the current pane's directory.
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style pane focus.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Vim-style pane resize.
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Reload this configuration.
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

###############################################################################
# Status line
###############################################################################

# Minimal red, black, and white status line.
set -g status on
set -g status-position bottom
set -g status-style "bg=#CC1619,fg=white"
set -g status-left-length 40
set -g status-left "#[bg=#CC1619,fg=white,bold] #S "
set -g status-right-length 80
set -g status-right "#[bg=#CC1619,fg=white]%Y-%m-%d %H:%M "

set -g window-status-style "bg=#CC1619,fg=#260405"
set -g window-status-format " #I:#W "
set -g window-status-current-style "bg=white,fg=#CC1619,bold"
set -g window-status-current-format " #I:#W "

set -g pane-border-style "fg=white"
set -g pane-active-border-style "fg=#CC1619"
set -g message-style "bg=#CC1619,fg=white"
